<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OBS Engine Master - Phase 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { background: transparent !important; overflow: hidden; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    #obs-position-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; transition: opacity 0.2s ease-out; }
    #obs-animation-wrapper { display: flex; align-items: center; justify-content: center; transform-origin: center center; }
    #obs-inner-bevel { position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s; }
    #obs-media-img { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 1; }
    
    #obs-text-overlay { 
      position: absolute; 
      z-index: 2; 
      text-align: center; 
      white-space: nowrap;
      pointer-events: none;
      font-weight: 900; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      text-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 2px 5px rgba(0,0,0,0.8); 
      transform: translate(-50%, -50%);
    }

    .fx-none { box-shadow: none; border: none; }
    .fx-drop { box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    .fx-neon { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8), 0 0 60px rgba(59, 130, 246, 0.4); border: 2px solid rgba(100, 150, 255, 0.8); }

    /* ================= 15 IN-ANIMATIONS KEYFRAMES ================= */
    @keyframes anim-cinematic { 0% { transform: scale(1.3); filter: brightness(0.2); opacity: 0; } 100% { transform: scale(1); filter: brightness(1); opacity: 1; } } 
    .anim-cinematic { animation: anim-cinematic 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
    
    @keyframes anim-3d-flip { 0% { transform: perspective(1200px) rotateY(-90deg); opacity: 0; } 100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; } } 
    .anim-3d-flip { animation: anim-3d-flip 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes anim-elastic-bounce { 0% { transform: translateY(-100vh); opacity: 0; } 50% { transform: translateY(12%); opacity: 1; } 75% { transform: translateY(-6%); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } } 
    .anim-elastic-bounce { animation: anim-elastic-bounce 1s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; }
    
    @keyframes anim-neon-fade { 0% { opacity: 0; filter: drop-shadow(0 0 50px rgba(0,255,255,1)) brightness(1.5); } 100% { opacity: 1; filter: drop-shadow(0 0 0px transparent) brightness(1); } } 
    .anim-neon-fade { animation: anim-neon-fade 1.2s ease-out forwards; }
    
    @keyframes anim-bottom-roller { 0% { transform: translateY(100vh) rotate(-15deg); opacity: 0; } 100% { transform: translateY(0) rotate(0); opacity: 1; } } 
    .anim-bottom-roller { animation: anim-bottom-roller 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes anim-skew-stretch { 0% { transform: translateX(-100vw) skewX(-25deg) scaleX(1.4); opacity: 0; } 100% { transform: translateX(0) skewX(0) scaleX(1); opacity: 1; } } 
    .anim-skew-stretch { animation: anim-skew-stretch 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes anim-top-drop { 0% { transform: translateY(-100vh); opacity: 0; } 60% { transform: translateY(0); opacity: 1; } 75% { transform: rotate(-5deg); opacity: 1; } 90% { transform: rotate(5deg); opacity: 1; } 100% { transform: rotate(0); opacity: 1; } } 
    .anim-top-drop { animation: anim-top-drop 0.9s ease-out forwards; }
    
    @keyframes anim-flash-glitch { 0% { transform: translateX(30%) scale(1.1); filter: hue-rotate(90deg) contrast(2); opacity: 0; } 20% { transform: translateX(-15%); filter: hue-rotate(-90deg) contrast(1.5); opacity: 1; } 40% { transform: translateX(10%); filter: hue-rotate(45deg); opacity: 0.8; } 60% { transform: translateX(-5%); filter: hue-rotate(-45deg); opacity: 1; } 100% { transform: translateX(0) scale(1); filter: none; opacity: 1; } } 
    .anim-flash-glitch { animation: anim-flash-glitch 0.6s linear forwards; }
    
    @keyframes anim-diagonal-wave { 0% { transform: translate(-250px, -250px) rotate(-45deg); opacity: 0; } 100% { transform: translate(0, 0) rotate(0deg); opacity: 1; } } 
    .anim-diagonal-wave { animation: anim-diagonal-wave 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes anim-heartbeat { 0% { transform: scale(0.6); opacity: 0; } 40% { transform: scale(1.15); opacity: 1; } 60% { transform: scale(0.95); opacity: 1; } 80% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } } 
    .anim-heartbeat { animation: anim-heartbeat 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes anim-split-horizon { 0% { transform: scaleY(0); filter: blur(10px); opacity: 0; } 100% { transform: scaleY(1); filter: blur(0); opacity: 1; } } 
    .anim-split-horizon { animation: anim-split-horizon 1s cubic-bezier(0.86, 0, 0.07, 1) forwards; }
    
    @keyframes anim-blur-focus { 0% { filter: blur(40px); transform: scale(1.1); opacity: 0; } 100% { filter: blur(0); transform: scale(1); opacity: 1; } } 
    .anim-blur-focus { animation: anim-blur-focus 1.2s ease-out forwards; }
    
    @keyframes anim-spiral-vortex { 0% { transform: scale(0) rotate(-720deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } } 
    .anim-spiral-vortex { animation: anim-spiral-vortex 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes anim-elegant-curtain { 0% { transform: translateX(100vw); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } } 
    .anim-elegant-curtain { animation: anim-elegant-curtain 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes anim-corner-snap { 0% { transform: translate(50vw, 50vh) rotate(45deg) scale(0.5); opacity: 0; } 100% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; } } 
    .anim-corner-snap { animation: anim-corner-snap 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    /* ================= 15 OUT-ANIMATIONS KEYFRAMES ================= */
    @keyframes exit-fade-out { to { opacity: 0; } } 
    .exit-fade-out { animation: exit-fade-out 0.6s ease forwards; }
    
    @keyframes exit-slide-down { to { transform: translateY(100vh); opacity: 0; } } 
    .exit-slide-down { animation: exit-slide-down 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes exit-zoom-out { to { transform: scale(0.5); opacity: 0; filter: blur(10px); } } 
    .exit-zoom-out { animation: exit-zoom-out 0.7s ease-in forwards; }
    
    @keyframes exit-3d-flip { to { transform: perspective(1200px) rotateY(90deg); opacity: 0; } } 
    .exit-3d-flip { animation: exit-3d-flip 0.7s ease-in forwards; }
    
    @keyframes exit-bounce-out { 20% { transform: scale(1.1); } 100% { transform: scale(0); opacity: 0; } } 
    .exit-bounce-out { animation: exit-bounce-out 0.6s ease forwards; }

    @keyframes exit-slide-up { to { transform: translateY(-100vh); opacity: 0; } } 
    .exit-slide-up { animation: exit-slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes exit-slide-left { to { transform: translateX(-100vw); opacity: 0; } } 
    .exit-slide-left { animation: exit-slide-left 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes exit-slide-right { to { transform: translateX(100vw); opacity: 0; } } 
    .exit-slide-right { animation: exit-slide-right 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes exit-skew-out { to { transform: skewX(25deg) scaleX(0); opacity: 0; } } 
    .exit-skew-out { animation: exit-skew-out 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes exit-glitch-out { 0% { filter: hue-rotate(180deg) invert(1); transform: scale(1.05); } 100% { filter: brightness(0); opacity: 0; transform: scale(0.8); } } 
    .exit-glitch-out { animation: exit-glitch-out 0.5s ease-out forwards; }

    @keyframes exit-blur-out { to { filter: blur(50px); opacity: 0; transform: scale(1.2); } } 
    .exit-blur-out { animation: exit-blur-out 0.8s ease forwards; }

    @keyframes exit-spiral-out { to { transform: scale(0) rotate(540deg); opacity: 0; } } 
    .exit-spiral-out { animation: exit-spiral-out 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes exit-unsplit-out { to { transform: scaleY(0); opacity: 0; filter: blur(5px); } } 
    .exit-unsplit-out { animation: exit-unsplit-out 0.8s cubic-bezier(0.86, 0, 0.07, 1) forwards; }

    @keyframes exit-snap-out { to { transform: translate(-40vw, -40vh) rotate(-30deg) scale(0.2); opacity: 0; } } 
    .exit-snap-out { animation: exit-snap-out 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    @keyframes exit-elastic-out { 0% { transform: scale(1); } 30% { transform: scale(1.15) translateY(20px); } 100% { transform: scale(0.1) translateY(-120vh); opacity: 0; } } 
    .exit-elastic-out { animation: exit-elastic-out 0.9s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; }
  </style>
</head>
<body>
  <div id="obs-position-wrapper">
    <div id="obs-animation-wrapper">
      <div id="obs-inner-bevel">
        <img id="obs-media-img" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
        <div id="obs-text-overlay"></div>
      </div>
    </div>
  </div>

  <script>
    const bc = new BroadcastChannel('obs_broadcasting_bus');
    const posW = document.getElementById("obs-position-wrapper");
    const animW = document.getElementById("obs-animation-wrapper");
    const innerB = document.getElementById("obs-inner-bevel");
    const imgM = document.getElementById("obs-media-img");
    const txtO = document.getElementById("obs-text-overlay");
    let exitTimer = null; 
    let extAnimStr = 'exit-fade-out'; 
    let slotTracking = null;

    function wipe() { 
      if(exitTimer) {
        clearTimeout(exitTimer);
        exitTimer = null;
      }
      posW.style.opacity = "0"; 
      animW.className = ""; 
    }

    function playSwoosh() {
      try { 
        const actx = new (window.AudioContext || window.webkitAudioContext)(); 
        const osc = actx.createOscillator(); 
        const gain = actx.createGain();
        osc.connect(gain); 
        gain.connect(actx.destination); 
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(400, actx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(50, actx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.4, actx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.6); 
        osc.start(); 
        osc.stop(actx.currentTime + 0.6); 
      } catch(e){}
    }

    function exitOut(localTriggered = true) { 
      if (posW.style.opacity === "0" && !extAnimStr) return;
      
      animW.className = extAnimStr; 
      bc.postMessage({ type: 'obs_cleared', slotId: slotTracking }); 
      
      // Update the active status back to Firebase so Mobile TV Sync displays standby with zero latency!
      if (localTriggered && window.FirebaseDb_clearActiveCast) {
        window.FirebaseDb_clearActiveCast();
      }

      setTimeout(() => {
        posW.style.opacity = "0";
      }, 1000); 
    }

    // Handles incoming triggering slots
    function handleCommand(d) {
      if (!d) return;
      if (d.type === 'clear') { 
        exitOut(false); 
        return; 
      }
      
      if (d.type === 'trigger') {
        wipe(); 
        
        extAnimStr = d.exitAnimation || d.outAnimation || 'exit-fade-out'; 
        let w = d.width || d.imageWidth || 800; 
        let h = d.height || d.imageHeight || 600; 
        slotTracking = d.slotId || d.id;
        
        innerB.style.borderRadius = (d.borderRadius || 0) + 'px'; 
        innerB.className = d.shadowEffect ? ('fx-' + d.shadowEffect) : 'fx-none';
        
        if (d.image) {
          imgM.src = d.image; 
          
          // Position and style the text overlay dynamically
          txtO.innerText = d.textOverlay || d.text || "";
          txtO.style.left = (d.textX !== undefined ? d.textX : 50) + '%';
          txtO.style.top = (d.textY !== undefined ? d.textY : 80) + '%';
          txtO.style.color = d.textColor || '#ffffff';
          txtO.style.fontSize = (d.fontSize || d.textFontSize || '36') + 'px';
          txtO.style.fontFamily = d.fontFamily || d.textFontFamily || "'Outfit', sans-serif";
          
          innerB.style.width = w + 'px'; 
          innerB.style.height = h + 'px'; 
          animW.style.width = w + 'px'; 
          animW.style.height = h + 'px';
          
          // Force reflow
          void animW.offsetWidth; 
          posW.style.opacity = "1"; 
          
          animW.className = d.animation || d.inAnimation || "anim-cinematic";
          
          if (d.audioEnabled || d.audio) playSwoosh();
          
          // Parse duration (countdown timer matrix)
          let autoHideSeconds = 0;
          let durStr = String(d.duration || d.autoHide || '0').trim().toLowerCase();
          if (durStr && durStr !== '0' && durStr !== 'none') {
            if (durStr.endsWith('s')) {
              autoHideSeconds = parseInt(durStr);
            } else if (durStr.endsWith('m')) {
              autoHideSeconds = parseInt(durStr) * 60;
            } else {
              autoHideSeconds = parseInt(durStr);
            }
          }
          
          if (autoHideSeconds > 0) {
            exitTimer = setTimeout(() => exitOut(true), autoHideSeconds * 1000);
          }
          
          bc.postMessage({
            type: 'obs_started', 
            slotId: slotTracking, 
            image: d.image, 
            width: w, 
            height: h, 
            text: txtO.innerText, 
            br: innerB.style.borderRadius, 
            fx: innerB.className
          });
        }
      }
    }

    // Attach handleCommand globally for modules to interface with
    window.handleCommand = handleCommand;

    bc.onmessage = (e) => handleCommand(e.data);
    try { 
      const cache = localStorage.getItem('obs_stream_payload'); 
      if (cache) handleCommand(JSON.parse(cache)); 
    } catch(e){}
    
    window.addEventListener('storage', (e) => { 
      if (e.key === 'obs_stream_payload') { 
        try { 
          handleCommand(JSON.parse(e.newValue)); 
        } catch(err){} 
      }
    });
  </script>

  <!-- Firebase Script modules for remote sync cast -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtD8HhanKv1UsiOG4dggg_8ZkLBeEFN5g",
      authDomain: "cricket-48711.firebaseapp.com",
      databaseURL: "https://cricket-48711-default-rtdb.firebaseio.com",
      projectId: "cricket-48711",
      storageBucket: "cricket-48711.firebasestorage.app",
      messagingSenderId: "44956458682",
      appId: "1:44956458682:web:7728dfdb165a996032e0c3",
      measurementId: "G-GW04H05M9G"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);
      const liveRef = ref(database, 'live_broadcast/active_slot');
      
      onValue(liveRef, (snap) => {
        const d = snap.val();
        if (d) {
          // Trigger the payload remotely
          if (window.handleCommand) {
            window.handleCommand(d);
          }
        }
      });

      // Clear Active Cast State globally
      window.FirebaseDb_clearActiveCast = () => {
        const clearRef = ref(database, 'live_broadcast/active_slot');
        return set(clearRef, {
          type: 'clear',
          timestamp: Date.now()
        }).catch(err => console.error("Firebase update clear failed:", err));
      };
    } catch(e) {
      console.error("OBS Remote Firebase connection error:", e);
    }
  </script>
</body>
</html>
